<style>
    /* Zmienne i tło, żeby przypominało Twoją stronę */
    :root { --bg: #0b050f; }
    body {
        background-color: var(--bg);
        color: white;
        font-family: sans-serif;
        overflow-x: hidden;
        margin: 0;
        height: 100vh;
    }

    /* =========================================
       BAJER 1: TRZĘSIENIE EKRANU
       ========================================= */
    @keyframes epicShake {
        0% { transform: translate(2px, 1px) rotate(0deg); }
        10% { transform: translate(-1px, -2px) rotate(-1deg); }
        20% { transform: translate(-3px, 0px) rotate(1deg); }
        30% { transform: translate(0px, 2px) rotate(0deg); }
        40% { transform: translate(1px, -1px) rotate(1deg); }
        50% { transform: translate(-1px, 2px) rotate(-1deg); }
        60% { transform: translate(-3px, 1px) rotate(0deg); }
        70% { transform: translate(2px, 1px) rotate(-1deg); }
        80% { transform: translate(-1px, -1px) rotate(1deg); }
        90% { transform: translate(2px, 2px) rotate(0deg); }
        100% { transform: translate(1px, -2px) rotate(-1deg); }
    }
    .shake-active {
        animation: epicShake 0.4s infinite; /* Ekran drży dopóki klasa jest aktywna */
    }

    /* =========================================
       BAJER 2: ROZBŁYSK ŚWIATŁA
       ========================================= */
    #dragon-flash {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background: radial-gradient(circle at bottom right, rgba(255, 60, 0, 0.4) 0%, transparent 70%);
        opacity: 0;
        pointer-events: none;
        z-index: 9997;
        transition: opacity 1s ease-in-out;
    }

    /* =========================================
       BAJER 3: EPICKI SMOK I JEGO ANIMACJE
       ========================================= */
    #epic-dragon {
        position: fixed;
        right: -100%;
        bottom: -20vh;
        width: 1200px;
        max-width: 150vw;
        transform: scale(0.4) rotate(30deg);
        opacity: 0;
        transition: all 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        pointer-events: none;
        z-index: 9999;
        
        mix-blend-mode: screen; 
        -webkit-mask-image: radial-gradient(circle 500px at center, black 40%, transparent 80%);
        mask-image: radial-gradient(circle 500px at center, black 40%, transparent 80%);
    }

    #epic-dragon.summoned {
        right: -10%; 
        bottom: -5vh;
        transform: scale(1) rotate(0deg); 
        opacity: 1;
        animation: dragonBreath 4s ease-in-out infinite alternate 2.5s;
    }

    @keyframes dragonBreath {
        0% { 
            transform: scale(1) rotate(0deg) translateY(0); 
            filter: drop-shadow(0 0 10px rgba(255, 100, 0, 0.1)); 
        }
        100% { 
            transform: scale(1.02) rotate(-1deg) translateY(-15px); 
            filter: drop-shadow(0 0 80px rgba(255, 50, 0, 0.8)); 
        }
    }

    /* =========================================
       BAJER 4: SYSTEM ISKIER (CANVAS)
       ========================================= */
    #dragon-embers {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        pointer-events: none;
        z-index: 9998;
    }

<script>
    // --- SYSTEM DŹWIĘKU (Syntetyczny ryk / dudnienie) ---
    function playDragonRumble() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        
        // Zębaty profil fali, idealny na warczenie/dudnienie
        osc.type = 'sawtooth'; 
        
        // Dźwięk zaczyna się dość wysoko (jak na ryk) i szybko spada do niskiego basu
        osc.frequency.setValueAtTime(80, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(15, ctx.currentTime + 3);
        
        // Głośność
        gain.gain.setValueAtTime(0, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.8, ctx.currentTime + 0.5); // gwałtowne uderzenie
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 6); // długie wybrzmiewanie
        
        osc.connect(gain);
        gain.connect(ctx.destination);
        
        osc.start();
        osc.stop(ctx.currentTime + 6);
    }

    // --- SYSTEM ISKIER (Canvas Particles) ---
    const canvas = document.getElementById('dragon-embers');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let isSpawningEmbers = false;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Ember {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height + 10;
            // Iskry lecą w górę i lekko w lewo (od smoka z prawej)
            this.vx = (Math.random() - 0.8) * 4; 
            this.vy = (Math.random() * -5) - 2;
            this.life = 1;
            this.decay = Math.random() * 0.02 + 0.01;
            this.size = Math.random() * 4 + 1;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life -= this.decay;
            // Dodajemy lekki wiatr i zawirowania
            this.vx += (Math.random() - 0.5) * 0.5;
        }
        draw() {
            if (this.life <= 0) return;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            // Kolor ognia zależny od życia iskry
            ctx.fillStyle = `rgba(255, ${Math.floor(100 * this.life)}, 0, ${this.life})`;
            ctx.fill();
        }
    }

    function animateEmbers() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (isSpawningEmbers) {
            // Dodaj od 1 do 3 iskier na klatkę
            for(let i=0; i<3; i++) particles.push(new Ember());
        }
        
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].life <= 0) {
                particles.splice(i, 1);
                i--;
            }
        }
        requestAnimationFrame(animateEmbers);
    }
    animateEmbers(); // Uruchomienie pętli (początkowo pusta)

    // --- GŁÓWNA FUNKCJA ORKIESTRUJĄCA ---
    function przywolajEpickiegoSmoka() {
        const smok = document.getElementById('epic-dragon');
        const flash = document.getElementById('dragon-flash');
        const body = document.getElementById('library-body'); // trzęsiemy całym body
        
        // Zablokuj klikanie na czas przywoływania
        if(smok.classList.contains('summoned')) return;

        // 1. Odtwarzamy ryk
        playDragonRumble();

        // 2. Wjazd smoka
        smok.classList.add('summoned');
        
        // 3. Trzęsienie ekranu
        body.classList.add('shake-active');

        // Po 1.5 sekundy (kiedy smok uderza w krawędź ekranu) odpalamy błysk i iskry
        setTimeout(() => {
            flash.style.opacity = '1';
            isSpawningEmbers = true; // Zaczynamy generować iskry
            
            // Ekran przestaje się trząść po uderzeniu
            setTimeout(() => {
                body.classList.remove('shake-active');
            }, 500);

            // Błysk szybko znika, zostaje tylko blask ognia z CSS
            setTimeout(() => {
                flash.style.opacity = '0';
            }, 800);

        }, 1200);

        // 4. Smok odlatuje po 9 sekundach
        setTimeout(() => {
            smok.classList.remove('summoned');
            isSpawningEmbers = false; // Przestajemy sypać iskrami (stare dopalą się i znikną)
        }, 9000);
    }
</script>

<script>
    // ==========================================
    // LOGIKA ŚWIETLIKÓW 
    // ==========================================
    (function initFireflies() {
        const fCanvas = document.getElementById('ambient-fireflies');
        if (!fCanvas) return;
        const fCtx = fCanvas.getContext('2d');
        let firefliesArray = [];
        const numFireflies = 45; // Ilość świetlików na ekranie

        function resizeFCanvas() {
            fCanvas.width = window.innerWidth;
            fCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeFCanvas);
        resizeFCanvas();

        class Firefly {
            constructor() {
                this.x = Math.random() * fCanvas.width;
                this.y = Math.random() * fCanvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 0.3 + 0.1;
                this.blinkPhase = Math.random() * Math.PI * 2;
                this.blinkSpeed = Math.random() * 0.02 + 0.01;
            }

            update() {
                this.angle += (Math.random() - 0.5) * 0.1;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                if (this.x < 0) this.x = fCanvas.width;
                if (this.x > fCanvas.width) this.x = 0;
                if (this.y < 0) this.y = fCanvas.height;
                if (this.y > fCanvas.height) this.y = 0;

                this.blinkPhase += this.blinkSpeed;
            }

            draw() {
                let opacity = (Math.sin(this.blinkPhase) + 1) / 2; 
                opacity = opacity * 0.7 + 0.1; 

                fCtx.beginPath();
                fCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                // ZMIANA: Eteryczny, chłodny fioletowo-niebieski kolor pyłu
                fCtx.fillStyle = `rgba(147, 112, 219, ${opacity})`;
                
                fCtx.shadowBlur = 15;
                // ZMIANA: Ciemniejsza, fioletowa poświata
                fCtx.shadowColor = 'rgba(138, 43, 226, 1)';
                fCtx.fill();
                fCtx.shadowBlur = 0; 
            }
        }

        for (let i = 0; i < numFireflies; i++) {
            firefliesArray.push(new Firefly());
        }

        function animateFireflies() {
            fCtx.clearRect(0, 0, fCanvas.width, fCanvas.height);
            for (let i = 0; i < firefliesArray.length; i++) {
                firefliesArray[i].update();
                firefliesArray[i].draw();
            }
            requestAnimationFrame(animateFireflies);
        }
        animateFireflies();
    })();


    // ==========================================
    // LOGIKA MAGICZNEGO KURSORA
    // ==========================================
    (function initMagicCursor() {
        const cursor = document.getElementById('magic-cursor');
        if (!cursor) return;
        let lastX = 0, lastY = 0;
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            const deltaX = e.clientX - lastX;
            const deltaY = e.clientY - lastY;
            const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
            
            if (distance > 15) {
                createTrail(e.clientX, e.clientY);
                lastX = e.clientX;
                lastY = e.clientY;
            }
        });

        function createTrail(x, y) {
            const trail = document.createElement('div');
            trail.className = 'cursor-trail';
            
            const offsetX = (Math.random() - 0.5) * 10;
            const offsetY = (Math.random() - 0.5) * 10;
            
            trail.style.left = (x + offsetX) + 'px';
            trail.style.top = (y + offsetY) + 'px';
            
            document.body.appendChild(trail);
            
            setTimeout(() => {
                trail.remove();
            }, 600);
        }
        
        document.addEventListener('mousedown', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(0.5)';
        });
        document.addEventListener('mouseup', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(1)';
        });
    })();
</script>
